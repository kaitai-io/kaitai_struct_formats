name: formats.kaitai.io

on:
  push:
    branches:
      - master

# Cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: '4.0'
          working-directory: _build  # Used to resolve `Gemfile.lock` and install Bundler accordingly
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Install deps
        run: |
          sudo apt-get update
          curl -fsSLO https://github.com/kaitai-io/kaitai_struct_compiler/releases/download/0.11/kaitai-struct-compiler_0.11_all.deb
          sha256sum -c -w .github/kaitai-struct-compiler_0.11_all.deb.sha256
          sudo apt-get install ./kaitai-struct-compiler_0.11_all.deb
          sudo apt-get install --no-install-recommends -y \
            git ssh \
            locales \
            default-jre-headless \
            make gcc libc6-dev \
            graphviz \
            rsync
          ksc --version
      - name: Fix locales
        run: |
          echo 'en_US.UTF-8 UTF-8' | sudo tee /etc/locale.gen
          echo 'LANG="en_US.UTF-8"' | sudo tee /etc/default/locale
          sudo dpkg-reconfigure --frontend=noninteractive locales
          locale
      - name: Install Ruby deps
        run: |
          echo 'gem: --no-document' | sudo tee /etc/gemrc
          cd _build
          bundle install
      - name: Build targets
        working-directory: _build
        run: ./build-target .. target
      - name: Upload build targets log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: log.json
          path: _build/target/log.json
      - name: Build diagrams
        working-directory: _build
        run: ./build-diagrams target html
      - name: Build HTML
        working-directory: _build
        run: ./build-html .. target html
      - name: Deploy
        env:
          BOT_SSH_KEY: ${{secrets.BOT_SSH_KEY}}
        run: |
          .github/push_artifacts/git_config_kaitai_bot
          .github/push_artifacts/publish \
            -o kaitai-io \
            -r formats-kaitai-io.github.io \
            -m "Build results of ${GITHUB_REF#refs/heads/*} $GITHUB_REPOSITORY@$GITHUB_SHA" -- \
            --exclude=.git \
            --exclude=.travis.yml \
            --exclude=CNAME \
            --exclude=favicon.ico \
            --exclude=favicon.ico.license \
            _build/html/
        # NB: trailing slash in '_build/html/' is *very* important for rsync!
        if: github.ref == 'refs/heads/master'
